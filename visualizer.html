<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Puzzle Visualizer</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --tile-bg: #1e222b;
            --tile-color: #e2e8f0;
            --highlight: #00f0ff;
            --grid-gap: 10px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 40px;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1000px;
            width: 100%;
        }

        /* Left Side: Puzzle Board */
        .board-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .board {
            display: grid;
            gap: var(--grid-gap);
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            position: relative;
        }

        .tile {
            width: 80px;
            height: 80px;
            background-color: var(--tile-bg);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--tile-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .tile.empty {
            background-color: transparent;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.1);
            border: 1px dashed rgba(0, 240, 255, 0.3);
            cursor: default;
        }

        .tile.empty:hover {
            transform: none;
        }

        .status-text {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--highlight);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        /* Right Side: Controls */
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            margin: 0;
            color: var(--highlight);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            font-size: 2rem;
        }

        label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: -10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--highlight);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        input[type="number"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px;
            border-radius: 6px;
            width: 60px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            flex: 1;
        }

        button:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--highlight);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        button.primary {
            background: var(--highlight);
            color: #0f1115;
            border: none;
        }

        button.primary:hover {
            background: #33f3ff;
            box-shadow: 0 0 20px var(--highlight);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            gap: 5px;
        }

        .step-counter {
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-weight: bold;
            color: #94a3b8;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="board-wrapper">
        <div class="board" id="board" style="grid-template-columns: repeat(3, 1fr);">
            <!-- Tiles will be generated here -->
        </div>
        <div class="status-text" id="status">Distance to Snail Goal: 0</div>
    </div>

    <div class="controls">
        <h2>N-Puzzle Visualizer</h2>
        
        <label>Show Snail Goal (size NxN)</label>
        <div class="btn-group">
            <input type="number" id="sizeInput" value="3" min="2" max="10">
            <button onclick="handleGenerateGoal()">Generate Snail Goal</button>
        </div>

        <label>Manual Test (Edit state below)</label>
        <textarea id="customState" placeholder="Example:&#10;1 2 3&#10;4 0 5&#10;7 8 6"></textarea>
        <button class="primary" onclick="loadCustomState()">Load & Play Interactively!</button>

        <label>Autoplay (Paste your solution report here)</label>
        <textarea id="pathData" placeholder="Paste the '--- Move X ---' output block..."></textarea>
        <button onclick="parsePath()">Auto-Load Solution Path</button>

        <div class="playback-controls">
            <button onclick="prevStep()">◀ Prev</button>
            <button onclick="togglePlay()" id="playBtn">Play ▶</button>
            <button onclick="nextStep()">Next ▶</button>
        </div>
        <div class="step-counter" id="stepCounter">Step 0 / 0</div>
    </div>
</div>

<script>
    let size = 3;
    let boardState = [];
    let goalState = [];
    let pathHistory = [];
    let currentStepIndex = 0;
    let playInterval = null;

    // Snail Goal Generator logic (C++ clone)
    function generateSnailGoal(n) {
        let arr = new Array(n * n).fill(0);
        let val = 1;
        let top = 0, bottom = n - 1, left = 0, right = n - 1;

        while (val < n * n) {
            for (let i = left; i <= right && val < n * n; i++) arr[top * n + i] = val++;
            top++;
            for (let i = top; i <= bottom && val < n * n; i++) arr[i * n + right] = val++;
            right--;
            for (let i = right; i >= left && val < n * n; i--) arr[bottom * n + i] = val++;
            bottom--;
            for (let i = bottom; i >= top && val < n * n; i--) arr[i * n + left] = val++;
            left++;
        }
        return arr;
    }

    function initBoard() {
        const boardEl = document.getElementById('board');
        boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        boardEl.innerHTML = '';
        
        goalState = generateSnailGoal(size);

        for (let i = 0; i < size * size; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.id = `tile-${i}`;
            tile.onclick = () => handleTileClick(i);
            boardEl.appendChild(tile);
        }
        renderBoard();
        updateStatus();
    }

    function renderBoard() {
        if (!boardState || boardState.length !== size * size) return;
        
        for (let i = 0; i < size * size; i++) {
            const tile = document.getElementById(`tile-${i}`);
            const val = boardState[i];
            
            if (val === 0) {
                tile.innerText = '';
                tile.className = 'tile empty';
                tile.style.boxShadow = '';
            } else {
                tile.innerText = val;
                tile.className = 'tile';
                
                // Highlight tiles in their correct goal position
                if (val === goalState[i]) {
                    tile.style.boxShadow = "inset 0 0 15px rgba(0, 240, 255, 0.4)";
                    tile.style.border = "1px solid rgba(0, 240, 255, 0.3)";
                } else {
                    tile.style.boxShadow = "";
                    tile.style.border = "none";
                }
            }
        }
    }

    function arrayToMatrixString(arr) {
        let str = "";
        for (let i = 0; i < size; i++) {
            let row = arr.slice(i * size, (i + 1) * size);
            str += row.join(" ") + "\n";
        }
        return str.trim();
    }

    function handleGenerateGoal() {
        size = parseInt(document.getElementById('sizeInput').value) || 3;
        boardState = generateSnailGoal(size);
        document.getElementById('customState').value = arrayToMatrixString(boardState);
        pathHistory = [[...boardState]];
        currentStepIndex = 0;
        initBoard();
        updateStepCounter();
    }

    function loadCustomState() {
        stopPlay();
        const text = document.getElementById('customState').value;
        const numbers = text.match(/\d+/g);
        
        if (!numbers) return;
        
        let newSize = Math.sqrt(numbers.length);
        if (!Number.isInteger(newSize)) {
            alert('Invalid input. Make sure the number of tiles forms a perfect square (e.g. 9 for 3x3).');
            return;
        }
        
        size = newSize;
        document.getElementById('sizeInput').value = size;
        boardState = numbers.map(Number);
        
        pathHistory = [ [...boardState] ];
        currentStepIndex = 0;
        
        initBoard();
        updateStepCounter();
    }

    function handleTileClick(index) {
        const emptyIndex = boardState.indexOf(0);
        
        // Calculate 2D coordinates
        const row = Math.floor(index / size);
        const col = index % size;
        const eRow = Math.floor(emptyIndex / size);
        const eCol = emptyIndex % size;
        
        // Check if clicked tile is adjacent to empty tile
        const isAdjacent = (Math.abs(row - eRow) + Math.abs(col - eCol) === 1);
        
        if (isAdjacent) {
            // Swap
            boardState[emptyIndex] = boardState[index];
            boardState[index] = 0;
            
            // Overwrite history if we've clicked during playback
            pathHistory = pathHistory.slice(0, currentStepIndex + 1);
            pathHistory.push([...boardState]);
            currentStepIndex++;
            
            renderBoard();
            updateStatus();
            updateStepCounter();
        }
    }

    function updateStatus() {
        // Calculate misplaced tiles distance
        let misplaced = 0;
        for (let i = 0; i < size * size; i++) {
            if (boardState[i] !== 0 && boardState[i] !== goalState[i]) {
                misplaced++;
            }
        }
        
        const statusEl = document.getElementById('status');
        if (misplaced === 0) {
            statusEl.innerText = "🎉 Snail Goal Reached! 🎉";
            statusEl.style.color = "#33f3ff";
            statusEl.style.textShadow = "0 0 20px #33f3ff";
        } else {
            statusEl.innerText = `Distance to Goal: ${misplaced} tiles misplaced`;
            statusEl.style.color = "var(--highlight)";
            statusEl.style.textShadow = "0 0 10px rgba(0, 240, 255, 0.5)";
        }
    }

    function parsePath() {
        stopPlay();
        const text = document.getElementById('pathData').value;
        
        // Split text by "--- Move X ---" or "--- Initial ---"
        const parts = text.split(/---\s+(?:Move\s+\d+|Initial)\s+---/);
        
        let parsedPath = [];
        
        for (let i = 1; i < parts.length; i++) {
            const numbers = parts[i].match(/\d+/g);
            if (numbers && numbers.length > 0) {
                // Determine size from length (must be perfect square)
                let tempSize = Math.sqrt(numbers.length);
                if (Number.isInteger(tempSize)) {
                    parsedPath.push(numbers.map(Number));
                }
            }
        }

        if (parsedPath.length > 0) {
            pathHistory = parsedPath;
            currentStepIndex = 0;
            size = Math.sqrt(pathHistory[0].length);
            document.getElementById('sizeInput').value = size;
            boardState = [...pathHistory[0]];
            
            initBoard();
            updateStepCounter();
            alert(`✅ Successfully loaded path with ${pathHistory.length - 1} moves! Click 'Play' to watch.`);
        } else {
            alert('❌ Could not parse path. Double check your pasted text from the report file.');
        }
    }

    function updateStepCounter() {
        const total = Math.max(0, pathHistory.length - 1);
        document.getElementById('stepCounter').innerText = `Step ${currentStepIndex} / ${total}`;
    }

    function nextStep() {
        if (currentStepIndex < pathHistory.length - 1) {
            currentStepIndex++;
            boardState = [...pathHistory[currentStepIndex]];
            renderBoard();
            updateStatus();
            updateStepCounter();
        } else {
            stopPlay();
        }
    }

    function prevStep() {
        if (currentStepIndex > 0) {
            currentStepIndex--;
            boardState = [...pathHistory[currentStepIndex]];
            renderBoard();
            updateStatus();
            updateStepCounter();
        } else {
            stopPlay();
        }
    }

    function togglePlay() {
        const btn = document.getElementById('playBtn');
        if (playInterval) {
            stopPlay();
        } else {
            if (currentStepIndex >= pathHistory.length - 1) {
                currentStepIndex = 0;
                boardState = [...pathHistory[0]];
                renderBoard();
                updateStatus();
                updateStepCounter();
            }
            btn.innerText = "⏸ Pause";
            playInterval = setInterval(nextStep, 600); // 0.6 seconds between moves
        }
    }

    function stopPlay() {
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = null;
        }
        document.getElementById('playBtn').innerText = "Play ▶";
    }

    // Startup
    handleGenerateGoal();
</script>

</body>
</html>
